<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111821" />
  <title>Offline · VPS Control Room</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #111821;
      --card: #1a2233;
      --border: rgba(255,255,255,0.08);
      --fg: #e2e8f0;
      --muted: #64748b;
      --accent: #22d3ee;
      --radius: 1.25rem;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: env(safe-area-inset-top, 1.5rem) env(safe-area-inset-right, 1.5rem) env(safe-area-inset-bottom, 1.5rem) env(safe-area-inset-left, 1.5rem);
      background:
        radial-gradient(circle at top left, rgba(34,211,238,0.08), transparent 30%),
        var(--bg);
    }

    .card {
      width: 100%;
      max-width: 28rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
      padding: 2rem;
      text-align: center;
    }

    .icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 4rem;
      height: 4rem;
      border-radius: 1rem;
      border: 1px solid var(--border);
      background: rgba(34,211,238,0.1);
      margin-bottom: 1.5rem;
    }

    .icon svg {
      width: 1.75rem;
      height: 1.75rem;
      stroke: var(--accent);
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-size: 1.35rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #f1f5f9;
    }

    p {
      margin-top: 0.75rem;
      font-size: 0.9rem;
      line-height: 1.65;
      color: var(--muted);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 1.75rem;
      padding: 0.65rem 1.4rem;
      border-radius: 999px;
      border: 1px solid rgba(34,211,238,0.25);
      background: rgba(34,211,238,0.12);
      color: #cffafe;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 150ms ease;
      text-decoration: none;
    }

    .btn:hover { background: rgba(34,211,238,0.2); }

    .divider {
      margin: 1.5rem 0;
      border: none;
      border-top: 1px solid var(--border);
    }

    .hint {
      font-size: 0.75rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24">
        <path d="M1 6s4-2 11-2 11 2 11 2M1 12s4-2 11-2 11 2 11 2M1 18s4-2 11-2 11 2 11 2"/>
        <line x1="1" y1="1" x2="23" y2="23"/>
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>
      VPS Control Room requires a network connection for live data.
      Check your connection and try again.
    </p>
    <a class="btn" href="/" onclick="window.location.reload(); return false;">
      <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      Retry connection
    </a>
    <hr class="divider" />
    <p class="hint">Cached pages will load automatically when you reconnect.</p>
  </div>
</body>
</html>
